{# Generic Django form field component #}
<div class="form-field">
  <label for="{{ field.id_for_label }}">{{ field.label }}</label>
  {{ field }}
  {% if field.help_text %}
    <p class="field-help">{{ field.help_text }}</p>
  {% endif %}
  {% if field.errors %}
    <p class="field-error">{{ field.errors|join:', ' }}</p>
  {% endif %}
</div>
