{% extends 'base.html' %}{% block content %}<section class='hero'><h1>Welcome to our shop</h1></section><section class='featured-products'><h2>Featured Products</h2><div class='grid'>{% for product in products %}<div class='product-card'><img src='{{ product.image }}' alt='Product Image'><h3>{{ product.title }}</h3><p>{{ product.price }}</p><button>Add to Cart</button></div>{% endfor %}</div></section>{% endblock %}
