{% extends 'base.html' %}{% block content %}<section class='product-list'><h2>Product List</h2><div class='grid'>{% for product in products %}<div class='product-card'><img src='{{ product.image }}' alt='Product Image'><h3>{{ product.title }}</h3><p>{{ product.price }}</p><button>Add to Cart</button></div>{% endfor %}</div></section>{% endblock %}
